name: OSS Issue Watcher

on:
  schedule:
    # Runs every 4 hours
    - cron: '0 */4 * * *'
  workflow_dispatch: # Manual trigger for testing

jobs:
  check-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Load cached seen issues
        id: cache
        uses: actions/cache@v4
        with:
          path: seen_issues.json
          key: seen-issues-${{ github.run_id }}
          restore-keys: |
            seen-issues-

      - name: Run issue checker
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          USER_CONFIGS: ${{ vars.USER_CONFIGS }}
          NOTIFY_NAME: ${{ vars.NOTIFY_NAME }}
          MAX_ISSUES: ${{ vars.MAX_ISSUES }}
          DIFFICULTY_MIN: ${{ vars.DIFFICULTY_MIN }}
          DIFFICULTY_MAX: ${{ vars.DIFFICULTY_MAX }}
          AREAS: ${{ vars.AREAS }}
        run: python check_issues.py

      - name: Save seen issues
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seen-issues
          path: seen_issues.json
          retention-days: 90
